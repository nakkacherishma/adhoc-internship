<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Contact Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Dynamic Contact Book</h1>

    <!-- Search -->
    <input type="text" id="search" placeholder="Search contact...">

    <!-- Category Tabs -->
    <div class="tabs">
        <button onclick="filterCategory('All')">All</button>
        <button onclick="filterCategory('Family')">Family</button>
        <button onclick="filterCategory('Friends')">Friends</button>
        <button onclick="filterCategory('Work')">Work</button>
    </div>

    <!-- Add Contact Form -->
    <div class="form">
        <input type="text" id="name" placeholder="Name">
        <input type="number" id="phone" placeholder="Phone Number">
        <input type="email" id="email" placeholder="Email">

        <select id="category">
            <option>Family</option>
            <option>Friends</option>
            <option>Work</option>
        </select>

        <button onclick="addContact()">Add Contact</button>
    </div>

    <!-- Contact Cards -->
    <div id="contactList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
